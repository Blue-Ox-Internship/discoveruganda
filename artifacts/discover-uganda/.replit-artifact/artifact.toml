kind = "web"
previewPath = "/"
title = "Discover Uganda"
version = "1.0.0"
id = "artifacts/discover-uganda"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20068

[services.development]
run = "pnpm --filter @workspace/discover-uganda run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discover-uganda", "run", "build" ]
publicDir = "artifacts/discover-uganda/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20068"
BASE_PATH = "/"
